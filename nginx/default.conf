# 치킨이닭 reverse proxy — 외부 :80 단일 노출 → Express(app:3000) Docker 내부망 프록시.
# (ADR-023 운영 구조 보강 — 2026-05-16; Codex 리뷰 P2/P3 반영)
#
# 라우팅:
#   - /                  → SPA (Express dist 정적 서빙 + React Router; / 는 /menu 로 Navigate)
#   - /admin, /admin/    → /admin/login 으로 302 (React Router 에 /admin 자체 라우트 부재)
#   - /admin/*           → SPA (Express fallback 이 index.html 응답, React Router 처리)
#   - /admin/api/*       → Express (관리자 API, requireAdmin 가드)
#   - /admin/login (POST)/admin/logout (POST) → Express (로그인 API; GET 은 SPA)
#   - /api/*             → Express (사용자 API)
#   - /assets/*          → SPA static (Vite 해시 파일명 → immutable 1년 캐시)
#   - /healthz           → Express (백엔드 헬스체크 노출)
#
# Express(app.js)가 이미 SPA fallback·API·세션을 처리하므로 nginx 는 순수 reverse proxy.

# Codex P2 Finding 2 — /assets/* 캐시 정책은 컨텐츠 타입 기반.
# Express SPA fallback 이 missing /assets/* 요청에 index.html(text/html) 을 반환하는 케이스가 있어
# 단순 add_header immutable 은 *잘못된 응답까지* 1년 캐시함. 자산 MIME 만 immutable, 나머지(특히
# fallback HTML·404 등)는 no-store 로 빠져나가 ‘배포 후 stale asset’ 트랩 차단.
map $sent_http_content_type $asset_cache_control {
    default                       "no-store";
    "~*^application/javascript"   "public, max-age=31536000, immutable";
    "~*^text/javascript"          "public, max-age=31536000, immutable";
    "~*^text/css"                 "public, max-age=31536000, immutable";
    "~*^image/"                   "public, max-age=31536000, immutable";
    "~*^font/"                    "public, max-age=31536000, immutable";
    "~*^application/font"         "public, max-age=31536000, immutable";
    "~*^application/octet-stream" "public, max-age=31536000, immutable";
}

upstream chickenedak_app {
    server app:3000;
    keepalive 32;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # 주문 payload 는 수십~수백 바이트. Express express.json({limit:'64kb'}) 보다 약간 위로.
    client_max_body_size 1m;
    client_body_timeout 15s;
    client_header_timeout 15s;

    gzip on;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/xml
        image/svg+xml;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_vary on;

    # Codex P3 Finding 4 — 보안 헤더 중복/충돌 정리.
    # 프록시 응답은 Express Helmet 이 X-Content-Type-Options / Referrer-Policy / 그 외 보안 헤더를
    # 일관되게 부여하므로 nginx server-level 에서는 *추가하지 않음* (중복·값 충돌 방지).
    # 단, nginx 가 직접 응답하는 /admin 리다이렉트는 Helmet 을 거치지 않으므로 location 안에서만 명시.

    # /admin → PIN 입력 화면 (= /admin/login). exact match 라 /admin/login·/admin/dashboard
    # 등 다른 하위 경로엔 영향 X. 302 직접 응답이므로 보안 헤더를 여기서 부여.
    location = /admin {
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy no-referrer always;
        return 302 /admin/login;
    }
    location = /admin/ {
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy no-referrer always;
        return 302 /admin/login;
    }

    # Vite 해시 자산 (예: /assets/index-abc123.js) — 파일명 자체에 hash → 안전한 장기 캐시.
    # Express express.static 기본 Cache-Control(max-age=0) 제거 후 컨텐츠 타입 기반 정책 적용.
    location ^~ /assets/ {
        proxy_pass http://chickenedak_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_hide_header Cache-Control;
        add_header Cache-Control $asset_cache_control always;
    }

    # 그 외 전부 Express 로. Express 라우터가 처리:
    #   /, /menu, /cart 등 SPA 경로 (index.html fallback)
    #   /api/*, /admin/api/*, /admin/login(POST), /admin/logout(POST), /healthz
    # 보안 헤더는 Helmet (server/app.js helmet middleware) 가 부여 → nginx 무간섭.
    location / {
        proxy_pass http://chickenedak_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }
}
