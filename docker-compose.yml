# 치킨이닭 운영 compose — ADR-023.
# - app : Vite 빌드 결과 + Express + SQLite (named volume) — Docker 내부망에서만 접근.
# - nginx: 외부 :80 단일 노출 → app:3000 reverse proxy (2026-05-16 보강).
# 운영 절차: `docker compose up -d` → `docker compose logs -f` → `docker compose restart`.

services:
  app:
    build: .
    image: chickenedak:latest
    container_name: chickenedak
    restart: always
    # 외부 포트 비공개 — nginx 만 외부 노출 (compose 내부망에서 app:3000 으로 접근).
    expose:
      - "3000"
    env_file:
      - .env
    environment:
      # .env의 NODE_ENV(=development for 로컬)를 운영에서는 production으로 override.
      NODE_ENV: production
      PORT: 3000
      # SQLite 파일은 named volume 안쪽 경로로 강제 — 컨테이너 재기동에도 데이터 보존.
      DB_PATH: /data/order.sqlite
      # P1-2 (Codex v3 2026-05-15): 자동 백업 ZIP도 named volume 안쪽.
      # 컨테이너 재생성/이미지 재빌드 시에도 backups 보존 (ADR-022/023).
      BACKUP_DIR: /data/backups
      # P0-A (Codex v2 2026-05-15): 세션 쿠키 secure flag 명시적 opt-in.
      # nginx ↔ app 은 HTTP 내부망. 외부 nginx 가 HTTPS 종단점이 될 때만 'true' 로 옮기고
      # app.set('trust proxy', 1) 추가 — 현재(HTTP 부스 운영) 기본 false.
      SESSION_COOKIE_SECURE: "false"
    volumes:
      - chickenedak-data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  nginx:
    image: nginx:1.27-alpine
    container_name: chickenedak-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      # /healthz 는 app 으로 프록시 — 전체 스택 헬스 한 번에 확인.
      test: ["CMD", "wget", "-qO-", "http://localhost/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

volumes:
  chickenedak-data:
    driver: local
